<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gan Family Tree</title>
<meta name="description" content="The Gan family tree — browse ancestors, relatives, and family connections.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23a93c26%22/><text x=%2250%22 y=%2272%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22%23fdfaf2%22 font-family=%22Georgia,serif%22>%E9%A1%8F</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,550;9..144,650&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4eee1;
    --card: #fdfaf2;
    --ink: #2a2620;
    --muted: #8d8574;
    --accent: #a93c26;
    --accent-soft: #f1e0d8;
    --line: #ddd4c0;
    --male: #4e6e77;
    --female: #a1616b;
    --warn-ink: #8c5a24;
    --warn-bg: #f3e7cf;
    --radius: 14px;
    --serif: "Fraunces", Georgia, "Times New Roman", serif;
    --shadow: 0 1px 2px rgba(80, 60, 20, 0.05), 0 5px 18px rgba(80, 60, 20, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #23201b;
      --card: #2d2a24;
      --ink: #eae4d5;
      --muted: #a49b87;
      --accent: #d96a4a;
      --accent-soft: #47352c;
      --line: #423d33;
      --male: #7695a0;
      --female: #b98089;
      --warn-ink: #d9a878;
      --warn-bg: #3d3527;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.25), 0 5px 18px rgba(0, 0, 0, 0.3);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ::selection { background: var(--accent-soft); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  header {
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    display: flex;
    align-items: baseline;
    gap: 22px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 650;
    letter-spacing: 0.01em;
    margin: 0;
  }
  header h1 a { color: var(--ink); display: inline-flex; align-items: center; gap: 10px; }
  header h1 a:hover { text-decoration: none; color: var(--accent); }
  .seal {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    background: var(--accent);
    color: #fdfaf2;
    border-radius: 7px;
    font-family: Georgia, serif;
    font-size: 16px;
    box-shadow: inset 0 0 0 1.5px rgba(253, 250, 242, 0.35);
  }
  header nav { display: flex; gap: 16px; font-size: 0.92rem; }
  header nav a { color: var(--muted); }
  header nav a:hover { color: var(--accent); text-decoration: none; }

  .search-wrap { position: relative; margin-left: auto; align-self: center; }
  .search-wrap input {
    padding: 8px 16px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 0.92rem;
    width: 230px;
    background: var(--card);
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-wrap input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-results {
    position: absolute;
    top: 115%;
    right: 0;
    width: 300px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow), 0 12px 32px rgba(0,0,0,0.10);
    overflow: hidden;
    display: none;
  }
  .search-results.open { display: block; }
  .search-results a {
    display: block;
    padding: 9px 14px;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
  }
  .search-results a:last-child { border-bottom: none; }
  .search-results a:hover, .search-results a.active { background: var(--accent-soft); text-decoration: none; }
  .search-results .sub { font-size: 0.8rem; color: var(--muted); }

  main { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ---- Person profile ---- */
  .profile {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px;
    display: flex;
    gap: 22px;
    align-items: flex-start;
    position: relative;
  }
  .profile::after {
    content: "";
    position: absolute;
    inset: 7px;
    border: 1px solid var(--line);
    border-radius: calc(var(--radius) - 6px);
    pointer-events: none;
    opacity: 0.8;
  }
  .avatar {
    width: 76px; height: 76px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 1.45rem; font-weight: 550; color: #fdfaf2;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 2px rgba(253, 250, 242, 0.28);
  }
  .avatar.m { background: var(--male); }
  .avatar.f { background: var(--female); }
  .avatar.u { background: #a49b87; }
  .avatar.small { width: 44px; height: 44px; font-size: 0.95rem; border-radius: 10px; }
  .profile h2 {
    margin: 0 0 4px;
    font-family: var(--serif);
    font-size: 1.75rem;
    font-weight: 650;
    letter-spacing: 0.005em;
  }
  .kinship { color: var(--accent); font-size: 0.95rem; }
  .facts { display: grid; grid-template-columns: auto 1fr; gap: 3px 16px; margin-top: 12px; font-size: 0.93rem; }
  .facts dt { color: var(--muted); }
  .facts dd { margin: 0; }
  .notes { margin-top: 12px; font-size: 0.92rem; color: var(--muted); font-style: italic; max-width: 56ch; }
  .unknown-banner {
    margin-top: 10px;
    font-size: 0.85rem;
    color: var(--warn-ink);
    background: var(--warn-bg);
    border-radius: 8px;
    padding: 6px 10px;
    display: inline-block;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: inherit;
    display: block;
  }
  footer {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 40px;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }

  /* ---- Sections ---- */
  section { margin-top: 34px; }
  section > h3 {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 0 0 12px;
  }
  section > h3::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .cards { display: flex; flex-wrap: wrap; gap: 10px; }

  .pcard {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 16px 10px 10px;
    color: var(--ink);
    min-width: 220px;
    transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s;
  }
  .pcard:hover {
    text-decoration: none;
    border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .pcard.unknown { border-style: dashed; background: transparent; }
  .pcard .pname { font-family: var(--serif); font-weight: 600; font-size: 1rem; }
  .pcard .psub { font-size: 0.8rem; color: var(--muted); }
  .rel-tag {
    font-size: 0.7rem;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 1px 8px;
    margin-left: auto;
    white-space: nowrap;
  }

  /* ---- Union blocks ---- */
  .union {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .union-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .union-verb { font-size: 0.9rem; color: var(--muted); }
  .union .children-label { font-size: 0.8rem; color: var(--muted); margin: 10px 0 6px; }

  /* ---- Pedigree chart ---- */
  .ped { overflow-x: auto; padding: 4px 0; }
  .pednode { display: flex; align-items: center; }
  .pedparents { display: flex; flex-direction: column; gap: 10px; margin-left: 16px; padding-left: 16px; border-left: 2px solid var(--line); }
  .pedparents > .pednode { position: relative; }
  .pedparents > .pednode::before {
    content: "";
    position: absolute;
    left: -16px; top: 50%;
    width: 16px; height: 2px;
    background: var(--line);
  }
  .pedcard {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 13px;
    color: var(--ink);
    font-family: var(--serif);
    font-size: 0.92rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .pedcard:hover {
    text-decoration: none;
    border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
    box-shadow: var(--shadow);
  }
  .pedcard.unknown { border-style: dashed; background: transparent; color: var(--muted); }
  .pedcard .tree-meta { font-weight: 400; }

  /* ---- Family legend ---- */
  .legend {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 26px;
    margin-bottom: 20px;
    font-family: var(--serif);
    font-size: 0.98rem;
  }
  .legend p { margin: 0 0 8px; }
  .legend p:last-child { margin-bottom: 0; }
  .legend-seal {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px; height: 46px;
    flex-shrink: 0;
    background: var(--accent);
    color: #fdfaf2;
    border-radius: 10px;
    font-size: 26px;
    font-family: Georgia, serif;
    box-shadow: inset 0 0 0 2px rgba(253, 250, 242, 0.3);
  }

  /* ---- Tree view ---- */
  .tree-root {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  .tree-root > h3 { margin: 0 0 14px; font-family: var(--serif); font-size: 1.15rem; font-weight: 600; }
  ul.tree a { color: var(--ink); }
  ul.tree a:hover { color: var(--accent); text-decoration: none; }
  ul.tree, ul.tree ul { list-style: none; margin: 0; padding-left: 26px; border-left: 2px solid var(--line); }
  ul.tree { border-left: none; padding-left: 0; }
  ul.tree li { margin: 6px 0; position: relative; }
  ul.tree ul li::before {
    content: "";
    position: absolute;
    left: -26px; top: 13px;
    width: 18px; height: 2px;
    background: var(--line);
  }
  .tree-person { font-family: var(--serif); font-weight: 600; }
  .tree-partner { color: var(--muted); font-size: 0.92rem; }
  .tree-partner a { color: var(--muted); }
  .tree-meta { color: var(--muted); font-size: 0.82rem; font-weight: 400; }

  /* ---- All people ---- */
  .all-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }

  .empty { color: var(--muted); font-size: 0.92rem; font-style: italic; }

  @media (max-width: 600px) {
    .profile { flex-direction: column; }
    .search-wrap { margin-left: 0; width: 100%; }
    .search-wrap input { width: 100%; }
    .search-results { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1><a href="#/"><span class="seal">顏</span>Gan Family Tree</a></h1>
  <nav>
    <a href="#/tree">Full tree</a>
    <a href="#/all">Everyone</a>
  </nav>
  <div class="search-wrap">
    <input id="search" type="search" placeholder="Search people…" autocomplete="off">
    <div id="search-results" class="search-results"></div>
  </div>
</header>

<main id="app"></main>

<footer>
  Spotted a mistake, or know one of the missing names?
  <a href="https://github.com/victorgan/ganfamily/edit/main/data.js" target="_blank" rel="noopener">Edit the tree on GitHub</a>
  — every person and relationship lives in one simple file.
</footer>

<script src="data.js"></script>
<script>
"use strict";

// ---------------------------------------------------------------------------
// Lookups derived from PEOPLE / UNIONS
// ---------------------------------------------------------------------------
const byId = Object.fromEntries(PEOPLE.map(p => [p.id, p]));

function unionsOf(id)   { return UNIONS.filter(u => u.partners.includes(id)); }
function parentUnion(id){ return UNIONS.find(u => u.children.includes(id)) || null; }
function parentsOf(id)  { const u = parentUnion(id); return u ? u.partners.map(pid => byId[pid]).filter(Boolean) : []; }
function childrenOf(id) { return unionsOf(id).flatMap(u => u.children).map(cid => byId[cid]).filter(Boolean); }

function siblingsOf(id) {
  const own = parentUnion(id);
  if (!own) return { full: [], half: [] };
  const full = own.children.filter(c => c !== id).map(c => byId[c]).filter(Boolean);
  const half = [];
  for (const parentId of own.partners) {
    for (const u of unionsOf(parentId)) {
      if (u === own) continue;
      for (const c of u.children) {
        if (c !== id && !own.children.includes(c) && !half.some(h => h.id === c)) {
          half.push(byId[c]);
        }
      }
    }
  }
  return { full, half };
}

function dedupe(people) {
  return people.filter((p, i) => people.findIndex(x => x.id === p.id) === i);
}

function auntsUnclesOf(id) {
  const out = [];
  for (const parent of parentsOf(id)) {
    const s = siblingsOf(parent.id);
    for (const x of [...s.full, ...s.half]) if (!out.some(a => a.id === x.id)) out.push(x);
  }
  return out;
}

// ---------------------------------------------------------------------------
// 顏 clan generation numbers.
// Cheong Koon Gan is the 34th generation of the Gan (顏) clan, per family
// tradition — so his father is the 33rd and the earliest recorded ancestor
// here (Great-Grandfather Gan) the 32nd. Numbers descend patrilineally:
// daughters of the clan carry their number, but their children take their
// father's clan instead.
// ---------------------------------------------------------------------------
const GAN_GENERATIONS = (() => {
  const map = new Map();
  const seed = "gg-gan-father", seedGen = 32;
  if (!byId[seed]) return map;
  map.set(seed, seedGen);
  const queue = [[seed, seedGen]];
  while (queue.length) {
    const [pid, g] = queue.shift();
    if (byId[pid].gender !== "M" && pid !== seed) continue; // patrilineal
    for (const u of unionsOf(pid)) {
      for (const c of u.children) {
        if (!map.has(c)) { map.set(c, g + 1); queue.push([c, g + 1]); }
      }
    }
  }
  return map;
})();

function nth(n) {
  const s = ["th", "st", "nd", "rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// ---------------------------------------------------------------------------
// Person descriptors: a neutral one-line summary of who someone is
// ---------------------------------------------------------------------------
const CURRENT_YEAR = new Date().getFullYear();

function yearOf(v) {
  const m = String(v ?? "").match(/^(\d{4})/);
  return m ? +m[1] : null;
}

function gword(p, male, female, neutral) {
  return p.gender === "M" ? male : p.gender === "F" ? female : neutral;
}

const PARTNER_VERB = {
  married: "Married to", divorced: "Formerly married to",
  separated: "Separated from", partner: "Partner of", widowed: "Widowed from",
};

function personDescriptor(p) {
  // "Son of Forest Gan", "Married to Christine Gan", … — parentage first,
  // falling back to a partner; placeholder people are skipped as anchors.
  const parents = parentsOf(p.id).filter(x => !x.unknown);
  if (parents.length) {
    return `${gword(p, "Son", "Daughter", "Child")} of ${parents.map(x => x.name).join(" and ")}`;
  }
  for (const u of unionsOf(p.id)) {
    const other = byId[u.partners.find(x => x !== p.id)];
    if (other && !other.unknown) {
      return `${PARTNER_VERB[u.status] || "Partner of"} ${other.name}`;
    }
  }
  return null;
}

// ---------------------------------------------------------------------------
// Rendering helpers
// ---------------------------------------------------------------------------
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function initials(p) {
  if (p.unknown) return "?";
  return p.name.split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
}

function avatarClass(p) {
  if (p.unknown) return "u";
  return p.gender === "M" ? "m" : p.gender === "F" ? "f" : "u";
}

function avatarHtml(p, small) {
  const inner = p.photo ? `<img src="${esc(p.photo)}" alt="${esc(p.name)}">` : initials(p);
  return `<div class="avatar ${small ? "small " : ""}${avatarClass(p)}">${inner}</div>`;
}

function lifeSpan(p) {
  if (!p.born && !p.died) return null;
  const b = p.born ? `b. ${p.born}` : "b. ?";
  return p.died ? `${b} – d. ${p.died}` : b;
}

function subLine(p) {
  const bits = [];
  const span = lifeSpan(p);
  if (span) bits.push(span);
  if (p.location) bits.push(p.location);
  return bits.join(" · ");
}

function personCard(p, relTag, subExtra) {
  const sub = subLine(p);
  return `<a class="pcard ${p.unknown ? "unknown" : ""}" href="#/p/${p.id}">
    ${avatarHtml(p, true)}
    <div>
      <div class="pname">${esc(p.name)}</div>
      ${sub ? `<div class="psub">${esc(sub)}</div>` : ""}
      ${subExtra ? `<div class="psub">${esc(subExtra)}</div>` : ""}
    </div>
    ${relTag ? `<span class="rel-tag">${esc(relTag)}</span>` : ""}
  </a>`;
}

function cardsSection(title, entries) {
  // entries: array of [person, relTag?, subExtra?]
  if (!entries.length) return "";
  return `<section>
    <h3>${esc(title)}</h3>
    <div class="cards">${entries.map(([p, tag, subExtra]) => personCard(p, tag, subExtra)).join("")}</div>
  </section>`;
}

function pedNode(id, depth) {
  // One node of the ancestry chart: the person, with their parents nested
  // to the right. depth limits how many generations up are drawn.
  const p = byId[id];
  if (!p) return "";
  const years = lifeSpan(p);
  let html = `<div class="pednode"><a class="pedcard ${p.unknown ? "unknown" : ""}" href="#/p/${p.id}">${esc(p.name)}${years ? ` <span class="tree-meta">${esc(years)}</span>` : ""}</a>`;
  const parents = parentsOf(id);
  if (parents.length && depth > 0) {
    html += `<div class="pedparents">${parents.map(par => pedNode(par.id, depth - 1)).join("")}</div>`;
  } else if (parents.length) {
    html += `<div class="pedparents"><div class="pednode"><span class="tree-meta">&nbsp;⋯&nbsp;</span></div></div>`;
  }
  html += `</div>`;
  return html;
}

function unionYears(u) {
  if (!u.start && !u.end) return "";
  return ` <span class="tree-meta">(${u.start || "?"}${u.end ? "–" + u.end : ""})</span>`;
}

// ---------------------------------------------------------------------------
// Views
// ---------------------------------------------------------------------------
function renderPerson(id) {
  const p = byId[id];
  if (!p) return `<p class="empty">Person not found: ${esc(id)}</p>`;

  const facts = [];
  const by = yearOf(p.born), dy = yearOf(p.died);
  if (p.born) {
    let v = String(p.born) + (p.birthPlace ? ` — ${p.birthPlace}` : "");
    if (by && !p.died) v += ` (age ~${CURRENT_YEAR - by})`;
    facts.push(["Born", v]);
  } else if (p.birthPlace) facts.push(["Birthplace", p.birthPlace]);
  if (p.died) facts.push(["Died", String(p.died) + (by && dy ? ` (aged ~${dy - by})` : "")]);
  if (p.location) facts.push(["Lives in", p.location]);
  if (p.occupation) facts.push(["Occupation", p.occupation]);
  if (GAN_GENERATIONS.has(id)) {
    facts.push(["Generation", `${nth(GAN_GENERATIONS.get(id))} generation of the 顏 (Gan) clan`]);
  }

  const rel = personDescriptor(p);
  let html = `<div class="profile">
    ${avatarHtml(p)}
    <div>
      <h2>${esc(p.name)}</h2>
      ${rel ? `<div class="kinship">${esc(rel)}</div>` : ""}
      ${facts.length ? `<dl class="facts">${facts.map(([k, v]) =>
        `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join("")}</dl>` : ""}
      ${p.notes ? `<div class="notes">${esc(p.notes)}</div>` : ""}
      ${p.unknown ? `<div class="unknown-banner">Details unknown — help fill this in!</div>` : ""}
    </div>
  </div>`;

  // Ancestry chart doubles as the Parents section — parents, grandparents,
  // and great-grandparents are all clickable in it, so no separate cards.
  if (parentsOf(id).length) {
    html += `<section><h3>Ancestry</h3><div class="ped">${pedNode(id, 3)}</div></section>`;
  }

  // The person's own family comes first: partners & children …
  const unions = unionsOf(id);
  if (unions.length) {
    html += `<section><h3>Partners &amp; Children</h3>`;
    for (const u of unions) {
      const partner = byId[u.partners.find(x => x !== id)];
      const kids = u.children.map(c => byId[c]).filter(Boolean);
      html += `<div class="union">
        <div class="union-head">
          <span class="union-verb">${esc(PARTNER_VERB[u.status] || "Partner of")}</span>
          ${partner ? personCard(partner) : ""}
          ${unionYears(u)}
        </div>
        ${kids.length
          ? `<div class="children-label">Children</div><div class="cards">${kids.map(k => personCard(k)).join("")}</div>`
          : `<div class="empty">No children recorded.</div>`}
      </div>`;
    }
    html += `</section>`;
  }

  // … then the family they grew up in …
  const sibs = siblingsOf(id);
  const sibEntries = [
    ...sibs.full.map(x => [x]),
    ...sibs.half.map(x => [x, "half-sibling"]),
  ];
  html += cardsSection("Siblings", sibEntries);

  // … then extended family, each card noting which branch it comes through.
  const auntsUncles = auntsUnclesOf(id);
  html += cardsSection("Aunts & Uncles", auntsUncles.map(x => [x]));
  const cousins = dedupe(auntsUncles.flatMap(a => childrenOf(a.id)));
  html += cardsSection("Cousins", cousins.map(x => [x, null, personDescriptor(x)]));
  const niblings = dedupe([...sibs.full, ...sibs.half].flatMap(s => childrenOf(s.id)));
  html += cardsSection("Nieces & Nephews", niblings.map(x => [x, null, personDescriptor(x)]));

  return html;
}

function descendantList(personId, covered) {
  // Renders a person plus (recursively) their unions and children,
  // marking everyone rendered in `covered` so branches aren't duplicated.
  const p = byId[personId];
  if (!p) return "";
  covered.add(personId);
  let html = `<li><span class="tree-person"><a href="#/p/${p.id}">${esc(p.name)}</a></span>`;
  const meta = subLine(p);
  if (meta) html += ` <span class="tree-meta">${esc(meta)}</span>`;

  const unions = unionsOf(personId);
  for (const u of unions) {
    const partner = byId[u.partners.find(x => x !== personId)];
    if (partner) {
      covered.add(partner.id);
      html += `<div class="tree-partner">⚭ <a href="#/p/${partner.id}">${esc(partner.name)}</a>${unionYears(u)}</div>`;
    }
    if (u.children.length) {
      html += `<ul>${u.children.map(c => descendantList(c, covered)).join("")}</ul>`;
    }
  }
  html += `</li>`;
  return html;
}

function renderTree() {
  // Roots: people with no recorded parents who founded a branch (have
  // children). A candidate is skipped if it was already rendered inside an
  // earlier branch (e.g. someone who married in), or if all of its children
  // are already covered (e.g. the second set of great-grandparents of the
  // same grandparent couple).
  const covered = new Set();
  const roots = PEOPLE.filter(p => !parentUnion(p.id) && childrenOf(p.id).length);
  let html = `<div class="legend">
    <span class="legend-seal">顏</span>
    <div>
      <p>Legend has it that the first generation of the 顏 clan — <em>Gan</em> in
      Hokkien, <em>Yan</em> in Mandarin — was a disciple of Confucius. Yan clans
      traditionally trace their line to Yan Hui (顏回), the Master's favorite
      student.</p>
      <p>By that counting, this tree records the 32nd through 35th
      generations of the clan: Cheong Koon Gan is the 34th, and his
      children are the 35th.</p>
    </div>
  </div>`;
  for (const root of roots) {
    if (covered.has(root.id)) continue;
    if (childrenOf(root.id).every(k => covered.has(k.id))) continue;
    html += `<div class="tree-root">
      <h3>${esc(root.name)}’s branch</h3>
      <ul class="tree">${descendantList(root.id, covered)}</ul>
    </div>`;
  }
  return html || `<p class="empty">No tree data.</p>`;
}

function renderAll() {
  const sorted = [...PEOPLE].sort((a, b) => a.name.localeCompare(b.name));
  const known = sorted.filter(p => !p.unknown);
  const placeholders = sorted.filter(p => p.unknown);
  const card = p => personCard(p, null, personDescriptor(p));
  let html = `<section>
    <h3>Everyone (${known.length})</h3>
    <div class="all-grid">${known.map(card).join("")}</div>
  </section>`;
  if (placeholders.length) {
    html += `<section>
      <h3>Still to identify (${placeholders.length})</h3>
      <p class="empty">Relatives we know exist but whose names or details are missing — edit data.js to fill them in.</p>
      <div class="all-grid">${placeholders.map(card).join("")}</div>
    </section>`;
  }
  return html;
}

// ---------------------------------------------------------------------------
// Router
// ---------------------------------------------------------------------------
const app = document.getElementById("app");

function route() {
  const hash = location.hash || "#/";
  let html, title = "Gan Family Tree";
  if (hash.startsWith("#/p/")) {
    const id = hash.slice(4);
    html = renderPerson(id);
    if (byId[id]) title = `${byId[id].name} · Gan Family Tree`;
  } else if (hash === "#/tree") {
    html = renderTree();
    title = "Full tree · Gan Family Tree";
  } else if (hash === "#/all") {
    html = renderAll();
    title = "Everyone · Gan Family Tree";
  } else {
    html = renderPerson(HOME_PERSON);
  }
  document.title = title;
  app.innerHTML = html;
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", route);
route();

// ---------------------------------------------------------------------------
// Search
// ---------------------------------------------------------------------------
const searchInput = document.getElementById("search");
const searchResults = document.getElementById("search-results");
let searchMatches = [];
let searchIndex = -1;

function closeSearch() {
  searchResults.classList.remove("open");
  searchMatches = [];
  searchIndex = -1;
}

function paintSearch() {
  searchResults.innerHTML = searchMatches.length
    ? searchMatches.map((p, i) => {
        const sub = personDescriptor(p) || subLine(p);
        return `<a href="#/p/${p.id}" class="${i === searchIndex ? "active" : ""}">${esc(p.name)}${sub ? `<div class="sub">${esc(sub)}</div>` : ""}</a>`;
      }).join("")
    : `<a>No matches</a>`;
  searchResults.classList.add("open");
}

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { closeSearch(); return; }
  searchMatches = PEOPLE.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.location && p.location.toLowerCase().includes(q)) ||
    (p.occupation && p.occupation.toLowerCase().includes(q))
  ).slice(0, 8);
  searchIndex = searchMatches.length ? 0 : -1;
  paintSearch();
});

searchInput.addEventListener("keydown", e => {
  if (!searchMatches.length) {
    if (e.key === "Escape") { closeSearch(); searchInput.blur(); }
    return;
  }
  if (e.key === "ArrowDown") {
    e.preventDefault();
    searchIndex = (searchIndex + 1) % searchMatches.length;
    paintSearch();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    searchIndex = (searchIndex - 1 + searchMatches.length) % searchMatches.length;
    paintSearch();
  } else if (e.key === "Enter" && searchIndex >= 0) {
    e.preventDefault();
    location.hash = `#/p/${searchMatches[searchIndex].id}`;
    closeSearch();
    searchInput.value = "";
    searchInput.blur();
  } else if (e.key === "Escape") {
    closeSearch();
    searchInput.blur();
  }
});

searchResults.addEventListener("click", () => {
  closeSearch();
  searchInput.value = "";
});
document.addEventListener("click", e => {
  if (!e.target.closest(".search-wrap")) closeSearch();
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});
</script>
